# name属性用来指定这个工作流的名字
name: Download The SUBSCRIBE

on:
  push:
    branches:
      - main
  schedule:   
    - cron: '0 * * * *'   # 国际标准时间，每小时执行一次
  workflow_dispatch:      # 允许在 GitHub 网页上手动点击运行按钮

jobs:
  run-csjs:
    runs-on: ubuntu-latest
    permissions: write-all # 显式赋予 GitHub Action 读写仓库的最高权限
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # 【核心修复】必须设置为 true，让本地保持登录状态，后面的原生 git push 才能100%成功
          persist-credentials: true
          fetch-depth: 0

      - name: Download the subscribe
        run: |
          chmod +x ./run.sh
          sh ./run.sh

      - name: Commit and Push Changes
        run: |
          # 1. 配置 Git 身份
          git config --local user.email "flik@92coco.cn"
          git config --local user.name "Flik"
          
          # 2. 暂存所有修改
          git add .
          
          # 3. 允许空提交，防止 run.sh 没有下载到新内容时导致工作流报错崩溃
          git commit --allow-empty -m "由github actions推送,日期:`date`"
          
          # 4. 显式拉取最新的远程 main 分支进行变基，防止代码冲突
          git pull --rebase origin main
          
          # 5. 【核心修复】直接使用原生 Git 命令安全地推送到您当前的 main 分支
          git push origin HEAD:main
